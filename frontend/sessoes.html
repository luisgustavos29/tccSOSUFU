<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOS UFU - Minhas Sessões</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="css/globais.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="css/dashboard.css"> <link rel="stylesheet" href="css/sessoes.css">
</head>
<body>
    <main class="container-auth">
        <div class="mobile-wrapper" style="padding: 0; position: relative; overflow: hidden; display: flex; flex-direction: column;">
            
            <header class="header-auth" style="padding: 30px 25px 10px 25px; flex-shrink: 0; margin-bottom: 0;">
                <button class="btn-voltar" onclick="window.location.href='dashboard.html'">
                    <span class="material-symbols-rounded">arrow_back_ios_new</span>
                </button>
                <h2 style="font-size: 18px; font-weight: 600; color: var(--cor-texto-principal); margin:0;">Minhas Sessões</h2>
                <div style="width: 24px;"></div>
            </header>

            <div class="content-scroll" id="lista-sessoes">
                <p class="boas-vindas-texto" style="text-align: center; margin-top: 20px;">A carregar os seus agendamentos...</p>
            </div>

            <nav class="bottom-nav">
                <button class="nav-item" title="Início" onclick="window.location.href='dashboard.html'">
                    <span class="material-symbols-rounded">home</span>
                </button>
                <button class="nav-item ativo" title="Conteúdos" onclick="window.location.href='sessoes.html'">
                    <span class="material-symbols-rounded">menu_book</span>
                </button>
                <button class="nav-item emergencia" id="btn-emergencia" title="Ligar para o CVV 188" onclick="if(confirm('Ligar para o CVV (188)?')) window.location.href='tel:188'">
                    <span class="material-symbols-rounded" style="color: white; font-size: 28px;">call</span>
                </button> 
            </nav>

        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/sessoes.js"></script>
</body>
</html>
