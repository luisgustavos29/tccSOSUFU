<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOS UFU - Criar Conta</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="css/globais.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <main class="container-auth">
        <div class="mobile-wrapper">
            
            <header class="header-auth">
                <button class="btn-voltar" onclick="window.location.href='index.html'" aria-label="Voltar">
                    <span class="material-symbols-rounded">arrow_back_ios_new</span>
                </button>
                <div style="width: 24px;"></div> </header>

            <section class="boas-vindas">
                <h1 class="titulo-bemvindo">Novo por aqui?</h1>
                <p class="texto-descricao">Preencha seus dados abaixo para criar sua conta de estudante e acessar o suporte do SOS UFU.</p>
            </section>

            <form id="form-cadastro" class="form-auth">
                
                <div class="input-group">
                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" placeholder="Digite seu nome completo" required>
                </div>

                <div class="input-group">
                    <label for="email">E-mail Institucional</label>
                    <input type="email" id="email" placeholder="exemplo@ufu.br" required>
                </div>

                <div class="input-group">
                    <label for="matricula">Matrícula UFU</label>
                    <input type="text" id="matricula" placeholder="Ex: 11911BCC000" required>
                </div>

                <div class="input-group">
                    <label for="senha">Crie uma Senha</label>
                    <div class="password-wrapper">
                        <input type="password" id="senha" placeholder="Sua senha forte" required>
                        <span class="material-symbols-rounded btn-toggle-pass" id="toggle-senha">visibility_off</span>
                    </div>
                </div>

                <div style="min-height: 24px; margin-bottom: 15px; text-align: center;">
                    <p id="msg-erro" style="display: none; color: #E74C3C; font-size: 13px; margin: 0; font-weight: 500;"></p>
                    <p id="msg-sucesso" style="display: none; color: #7A6CFF; font-size: 14px; margin: 0; font-weight: 600;"></p>
                </div>

                <button type="submit" class="btn-primario" id="btn-cadastrar">Cadastrar</button>
            </form>

            <footer class="footer-auth" style="margin-top: 20px;">
                <p>Já tem uma conta? <a href="index.html">Entrar</a></p>
            </footer>
            
        </div>
    </main>

    <script src="js/auth.js"></script>
</body>
</html>
