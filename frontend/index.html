<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOS UFU - Entrar</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="css/globais.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <main class="container-auth">
        <div class="mobile-wrapper">
            
            <header class="header-auth">
                <div style="width: 24px;"></div> <h2>Entrar</h2>
                <div style="width: 24px;"></div>
            </header>

            <section class="boas-vindas">
                <h1 class="titulo-bemvindo">Bem-vindo(a)</h1>
                <p class="texto-descricao">Acesse sua conta com seu e-mail institucional para agendar acolhimentos e acessar nossos materiais de apoio psicológico.</p>
            </section>

            <form id="form-login" class="form-auth">
                <div class="grupo-input">
                    <label for="email">E-mail Institucional</label>
                    <input type="email" id="email" placeholder="aluno@ufu.br" required>
                </div>

                <div class="grupo-input">
                    <label for="senha">Senha</label>
                    <div class="input-com-icone">
                        <input type="password" id="senha" placeholder="Digite sua senha" required>
                        <span class="material-symbols-rounded icone-olho" id="toggle-senha" title="Mostrar/Ocultar senha">visibility</span>
                    </div>
                </div>

                <div class="esqueceu-senha">
                    <a href="#">Esqueceu a senha?</a>
                </div>

                <div id="mensagem-erro" class="erro-texto" style="display: none; font-weight: 500;"></div>

                <button type="submit" class="btn-primario" id="btn-entrar">Entrar</button>
            </form>

            <div class="acesso-publico">
                <div class="linha-ou"><span>ou acesse sem login</span></div>
                <div class="botoes-publicos">
                    <button type="button" class="btn-outline" onclick="window.location.href='conteudos.html'">
                        <span class="material-symbols-rounded">menu_book</span> Conteúdos
                    </button>
                    <button type="button" class="btn-outline-emergencia" onclick="if(confirm('Ligar para o CVV (188)?')) window.location.href='tel:188'">
                        <span class="material-symbols-rounded">call</span> Emergência
                    </button>
                </div>
            </div>

            <div class="auth-footer">
                <p>Não tem uma conta? <a href="cadastro.html">Criar Conta</a></p>
            </div>

        </div>
    </main>

    <script src="js/auth.js"></script>
</body>
</html>
